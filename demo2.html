<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba</title>
</head>

<body>
    <header>
        <h1>Mi sitio web</h1>
    </header>

    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#servicios">Servicios</a>
        <a href="#contacto">Contacto</a>
    </nav>

    <main>
        <h2>Bienvenido</h2>
        <p>Contenido principal</p>

        <section>
            <h2>Servicios</h2>
            <p>Ofrecemos desarrollo web</p>
        </section>

        <article>
            <h2>Noticia</h2>
            <p>Contenido de la noticia</p>
        </article>

        <aside>
            <p>Publicidad</p>

            <img src="foto.jpg" alt="Paisaje andino" width="300">

            <audio controls>
                <source src="audio.mp3" type="audio/mpeg">
            </audio>

            <video controls width="400" poster="portada.jpg">
                <source src="video.mp4" type="video/mp4">
            </video>

        </aside>


        <form action="/guardar" method="post">

            <input list="ciudades">
            <datalist id="ciudades">
                <option value="Lima">
                <option value="Cusco">
            </datalist>
        </form>


    </main>

    <footer>
        <p>© 2026 Mi empresa</p>
    </footer>
</body>

</html>
