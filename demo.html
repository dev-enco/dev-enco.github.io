<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Una página de ejemplo para demostrar etiquetas HTML">
    <title>Mi página</title>
</head>

<body>
    <h1>Hola mundo</h1>
    <p>Bienvenido a mi página</p>

    <h1>Título principal</h1>
    <h2>Subtítulo</h2>
    <h3>Sección</h3>

    <p>Este es un párrafo de ejemplo.</p>

    <p>Este es un <span style="color:red;">texto rojo</span>.</p>

    <p>Esto es <strong>muy importante</strong>.</p>

    <p>Debes <em>leer</em> esto.</p>

    <p>Línea 1<br>Línea 2</p>

    <hr>

    <p>Este texto es <mark>importante</mark>.</p>

    <p>Precio: $50 <small>sin impuestos</small></p>

</body>

</html>
